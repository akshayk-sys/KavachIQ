name = "kavach-iq"
compatibility_date = "2026-06-23"

# ── Worker Entry Point ──────────────────────────────────────────
# _worker.js is the Cloudflare Worker that handles all requests
# including SPA routing and optional API proxying.
main = "_worker.js"

# ── Static Assets ────────────────────────────────────────────────
# The ./dist folder is deployed as static assets (marketing site + React app).
# The Worker uses env.ASSETS.fetch() to serve these files.
[assets]
directory = "./dist"
