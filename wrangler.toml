name = "kavach-iq"
compatibility_date = "2026-06-23"

# ── Static Assets ────────────────────────────────────────────────
# Deploy the ./dist folder as static assets for the marketing site + React SPA.
# The cloudflare-build.sh script generates ./dist with:
#   - index.html, styles.css, script.js (marketing site)
#   - app/ (React SPA dashboard)
#   - _redirects, _headers (routing rules)

[assets]
directory = "./dist"
not_found_handling = "404.html"
